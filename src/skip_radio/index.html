<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkipRadio - Live Stream</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-card {
            background: #13131a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #22222e;
            width: 320px;
        }
        h1 {
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        .status {
            color: #8a8a93;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        #track-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            min-height: 1.6rem;
        }
        #track-artist {
            font-size: 1rem;
            color: #8a8a93;
            margin-bottom: 20px;
            min-height: 1.2rem;
        }
        .volume-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .volume-row span {
            font-size: 1.2rem;
            line-height: 1;
            min-width: 28px;
            text-align: center;
        }
        .volume-row input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: #2a2a3a;
            outline: none;
            cursor: pointer;
        }
        .volume-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            border: none;
            cursor: pointer;
        }
        .volume-row input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            border: none;
            cursor: pointer;
        }
        #volume-pct {
            font-size: 0.8rem;
            color: #8a8a93;
            min-width: 32px;
            text-align: right;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-skip {
            background: #00ff88;
            color: #0b0b0e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            flex: 1;
        }
        .btn-skip:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }
        .btn-pause {
            background: #2a2a3a;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 54px;
            padding: 15px 0;
        }
        .btn-pause:hover {
            transform: scale(1.05);
            background: #3a3a4a;
        }
        .btn-pause.paused {
            background: #00ff88;
            color: #0b0b0e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="radio-card">
        <h1>SkipRadio</h1>
        <div id="track-title">Loading...</div>
        <div id="track-artist"></div>
        <div class="status" id="stream-status"><span style="color:#ff3b30">●</span> LIVE</div>
        <div class="volume-row">
            <span>🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            <span id="volume-pct">100</span>
        </div>
        <audio id="audio-player" preload="auto"></audio>
        <div class="buttons">
            <button class="btn btn-pause" id="pause-btn">⏸</button>
            <button class="btn btn-skip" id="skip-btn">Skip</button>
        </div>
    </div>
    <script>
        const audio = document.getElementById('audio-player');
        const pauseBtn = document.getElementById('pause-btn');
        const skipBtn = document.getElementById('skip-btn');
        const titleEl = document.getElementById('track-title');
        const artistEl = document.getElementById('track-artist');
        const statusEl = document.getElementById('stream-status');
        const volumeSlider = document.getElementById('volume-slider');
        const volumePct = document.getElementById('volume-pct');

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value;
            volumePct.innerText = Math.round(volumeSlider.value * 100);
        });

        async function loadNext(action, elapsed) {
            const body = JSON.stringify({action: action || 'next', elapsed: elapsed || 0});
            const res = await fetch('/radio/next', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: body
            });
            if (!res.ok) {
                titleEl.innerText = 'No tracks available';
                artistEl.innerText = '';
                return;
            }
            const track = await res.json();
            titleEl.innerText = track.title;
            artistEl.innerText = track.artist;
            audio.src = `/audio/${track.id}`;
            audio.play();
            pauseBtn.classList.remove('paused');
            pauseBtn.innerText = '⏸';
        }

        function togglePause() {
            if (audio.paused) {
                audio.play();
                pauseBtn.classList.remove('paused');
                pauseBtn.innerText = '⏸';
            } else {
                audio.pause();
                pauseBtn.classList.add('paused');
                pauseBtn.innerText = '▶';
            }
        }

        audio.addEventListener('ended', () => loadNext('next'));
        audio.addEventListener('error', () => {
            statusEl.innerHTML = '<span style="color:#ff3b30">●</span> Audio not found — skipping';
            loadNext('skip', audio.currentTime);
        });
        audio.addEventListener('playing', () => {
            statusEl.innerHTML = '<span style="color:#ff3b30">●</span> LIVE';
        });
        skipBtn.addEventListener('click', () => loadNext('skip', audio.currentTime));
        pauseBtn.addEventListener('click', togglePause);
        loadNext('next');
    </script>
</body>
</html>
