<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkipRadio - Live Stream</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .radio-card {
            background: #13131a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #22222e;
            width: 320px;
        }
        h1 {
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        .status {
            color: #8a8a93;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-skip {
            background: #00ff88;
            color: #0b0b0e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            flex: 1;
        }
        .btn-skip:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }
        .btn-pause {
            background: #2a2a3a;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 54px;
            padding: 15px 0;
        }
        .btn-pause:hover {
            transform: scale(1.05);
            background: #3a3a4a;
        }
        .btn-pause.paused {
            background: #00ff88;
            color: #0b0b0e;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="radio-card">
        <h1>SkipRadio</h1>
        <div class="status" id="track-title">Loading...</div>
        <div class="status" id="stream-status"><span style="color:#ff3b30">●</span> LIVE</div>
        <audio id="audio-player" preload="auto"></audio>
        <div class="buttons">
            <button class="btn btn-pause" id="pause-btn">⏸</button>
            <button class="btn btn-skip" id="skip-btn">Skip</button>
        </div>
    </div>
    <script>
        const audio = document.getElementById('audio-player');
        const pauseBtn = document.getElementById('pause-btn');
        const skipBtn = document.getElementById('skip-btn');
        const titleEl = document.getElementById('track-title');
        const statusEl = document.getElementById('stream-status');
        async function loadNext() {
            const res = await fetch('/radio/next', { method: 'POST' });
            if (!res.ok) {
                titleEl.innerText = 'No tracks available';
                return;
            }
            const track = await res.json();
            titleEl.innerText = `${track.artist} — ${track.title}`;
            audio.src = `/audio/${track.id}`;
            audio.play();
            pauseBtn.classList.remove('paused');
            pauseBtn.innerText = '⏸';
        }
        function togglePause() {
            if (audio.paused) {
                audio.play();
                pauseBtn.classList.remove('paused');
                pauseBtn.innerText = '⏸';
            } else {
                audio.pause();
                pauseBtn.classList.add('paused');
                pauseBtn.innerText = '▶';
            }
        }
        audio.addEventListener('ended', loadNext);
        audio.addEventListener('error', () => {
            statusEl.innerHTML = '<span style="color:#ff3b30">●</span> Audio not found — skipping';
            loadNext();
        });
        audio.addEventListener('playing', () => {
            statusEl.innerHTML = '<span style="color:#ff3b30">●</span> LIVE';
        });
        skipBtn.addEventListener('click', loadNext);
        pauseBtn.addEventListener('click', togglePause);
        loadNext();
    </script>
</body>
</html>
